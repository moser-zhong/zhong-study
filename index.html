<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学五年级英文单词测验</title>
    <style>
        /* 全局样式设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Sans MS', '微软雅黑', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        /* 主容器样式 */
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 900px;
            width: 100%;
        }
        
        /* 导航标签样式 */
        .nav-tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f7fafc;
            border-radius: 15px;
            padding: 5px;
        }
        
        .nav-tab {
            flex: 1;
            background: transparent;
            border: none;
            border-radius: 10px;
            padding: 15px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #4a5568;
        }
        
        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 2px 10px rgba(102, 126, 234, 0.3);
        }
        
        .nav-tab:hover:not(.active) {
            background: #edf2f7;
        }
        
        /* 标题样式 */
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #4a5568;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            color: #718096;
            font-size: 1.2em;
        }
        
        /* 进度条样式 */
        .progress-bar {
            background: #e2e8f0;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        
        .progress {
            background: linear-gradient(90deg, #48bb78, #38a169);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 问题区域样式 */
        .question-section {
            margin-bottom: 30px;
        }
        
        .word-display {
            font-size: 3em;
            color: #2d3748;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }
        
        .question-text {
            font-size: 1.5em;
            color: #4a5568;
            text-align: center;
            margin-bottom: 25px;
        }
        
        /* 选项按钮样式 */
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .option-btn {
            background: #f7fafc;
            border: 3px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
            font-size: 1.3em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .option-btn:hover {
            background: #edf2f7;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .option-btn.correct {
            background: #c6f6d5;
            border-color: #48bb78;
            color: #22543d;
        }
        
        .option-btn.incorrect {
            background: #fed7d7;
            border-color: #f56565;
            color: #742a2a;
        }
        
        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }
        
        /* 反馈信息样式 */
        .feedback {
            text-align: center;
            font-size: 1.2em;
            margin-bottom: 20px;
            min-height: 30px;
        }
        
        .feedback.correct {
            color: #22543d;
        }
        
        .feedback.incorrect {
            color: #742a2a;
        }
        
        /* 按钮样式 */
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            padding: 15px 30px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        /* 结果页面样式 */
        .result-section {
            text-align: center;
            display: none;
        }
        
        .score {
            font-size: 4em;
            color: #4a5568;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .score-message {
            font-size: 1.5em;
            margin-bottom: 30px;
        }
        
        .star {
            font-size: 2em;
            color: #f6ad55;
            margin: 0 5px;
        }
        
        /* 题库管理页面样式 */
        .bank-section {
            display: none;
        }
        
        .bank-form {
            background: #f7fafc;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #4a5568;
        }
        
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.1em;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .batch-input {
            font-family: monospace;
            background: #2d3748;
            color: #e2e8f0;
        }
        
        /* 单词列表样式 */
        .word-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 20px;
        }
        
        .word-item {
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .word-info {
            flex: 1;
        }
        
        .word-text {
            font-size: 1.3em;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 5px;
        }
        
        .word-meaning {
            color: #718096;
            margin-bottom: 8px;
        }
        
        .word-options {
            font-size: 0.9em;
            color: #a0aec0;
        }
        
        .delete-btn {
            background: #f56565;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }
        
        .delete-btn:hover {
            background: #e53e3e;
            transform: scale(1.1);
        }
        
        /* 统计信息样式 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .stat-label {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        /* 提示信息样式 */
        .info-box {
            background: #bee3f8;
            border: 2px solid #90cdf4;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #2c5282;
        }
        
        .success-box {
            background: #c6f6d5;
            border: 2px solid #48bb78;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #22543d;
        }
        
        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .word-display {
                font-size: 2.5em;
            }
            
            .question-text {
                font-size: 1.3em;
            }
            
            .options {
                grid-template-columns: 1fr;
            }
            
            .nav-tabs {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <!-- 导航标签 -->
        <div class="nav-tabs">
            <button class="nav-tab active" onclick="showTab('quiz')">🎯 开始测验</button>
            <button class="nav-tab" onclick="showTab('bank')">📚 题库管理</button>
        </div>
        
        <!-- 测验页面 -->
        <section id="quizSection" class="quiz-section">
            <header>
                <h1>🎯 英文单词测验</h1>
                <p class="subtitle">小学五年级水平挑战</p>
            </header>
            
            <!-- 进度条 -->
            <div class="progress-bar">
                <div class="progress" id="progressBar"></div>
            </div>
            
            <!-- 问题区域 -->
            <section class="question-section" id="questionSection">
                <div class="word-display" id="wordDisplay"></div>
                <div class="question-text" id="questionText">请选择正确的中文意思：</div>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedback"></div>
                <button class="btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">下一题</button>
            </section>
            
            <!-- 结果区域 -->
            <section class="result-section" id="resultSection">
                <div class="score" id="finalScore"></div>
                <div class="score-message" id="scoreMessage"></div>
                <div id="stars"></div>
                <button class="btn" onclick="restartQuiz()">重新开始</button>
            </section>
        </section>
        
        <!-- 题库管理页面 -->
        <section id="bankSection" class="bank-section">
            <header>
                <h1>📚 题库管理</h1>
                <p class="subtitle">添加和管理英文单词题库</p>
            </header>
            
            <!-- 统计信息 -->
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number" id="totalWords">0</div>
                    <div class="stat-label">总单词数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="usedWords">0</div>
                    <div class="stat-label">本次使用</div>
                </div>
            </div>
            
            <!-- 添加单词表单 -->
            <div class="bank-form">
                <h3>📝 添加新单词</h3>
                <div class="form-group">
                    <label for="newWord">英文单词：</label>
                    <input type="text" id="newWord" placeholder="例如：apple">
                </div>
                <div class="form-group">
                    <label for="newMeaning">中文释义：</label>
                    <input type="text" id="newMeaning" placeholder="例如：苹果">
                </div>
                <div class="form-group">
                    <label for="newOptions">干扰选项（用逗号分隔，至少3个）：</label>
                    <input type="text" id="newOptions" placeholder="例如：香蕉,橙子,葡萄,梨子">
                </div>
                <button class="btn" onclick="addSingleWord()">添加单词</button>
            </div>
            
            <!-- 批量添加 -->
            <div class="bank-form">
                <h3>📋 批量添加单词</h3>
                <div class="info-box">
                    <strong>格式说明：</strong>每行一个单词，格式为：英文单词,中文释义,干扰选项1,干扰选项2,干扰选项3
                </div>
                <div class="form-group">
                    <label for="batchInput">批量输入：</label>
                    <textarea id="batchInput" class="batch-input" placeholder="apple,苹果,香蕉,橙子,葡萄&#10;book,书,笔,纸,橡皮&#10;cat,猫,狗,鸟,鱼"></textarea>
                </div>
                <button class="btn" onclick="addBatchWords()">批量添加</button>
            </div>
            
            <!-- 单词列表 -->
            <div>
                <h3>📖 当前题库</h3>
                <div class="word-list" id="wordList"></div>
                <button class="btn" onclick="clearAllWords()">清空题库</button>
            </div>
        </section>
    </main>

    <script>
        // 单词数据库 - 适合小学五年级水平的英文单词
        let wordDatabase = [
            { word: "apple", meaning: "苹果", options: ["苹果", "香蕉", "橙子", "葡萄"] },
            { word: "book", meaning: "书", options: ["书", "笔", "纸", "橡皮"] },
            { word: "cat", meaning: "猫", options: ["猫", "狗", "鸟", "鱼"] },
            { word: "dog", meaning: "狗", options: ["狗", "猫", "兔子", "老鼠"] },
            { word: "elephant", meaning: "大象", options: ["大象", "狮子", "老虎", "熊"] },
            { word: "flower", meaning: "花", options: ["花", "草", "树", "叶"] },
            { word: "house", meaning: "房子", options: ["房子", "学校", "医院", "商店"] },
            { word: "water", meaning: "水", options: ["水", "茶", "咖啡", "牛奶"] },
            { word: "friend", meaning: "朋友", options: ["朋友", "敌人", "老师", "同学"] },
            { word: "school", meaning: "学校", options: ["学校", "图书馆", "公园", "游泳池"] },
            { word: "computer", meaning: "电脑", options: ["电脑", "手机", "电视", "收音机"] },
            { word: "happy", meaning: "快乐的", options: ["快乐的", "悲伤的", "生气的", "害怕的"] }
        ];
        
        // 游戏状态变量
        let currentQuestion = 0;
        let score = 0;
        let answered = false;
        let selectedWords = [];
        
        // 页面切换功能
        function showTab(tabName) {
            // 切换标签状态
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 切换页面显示
            if (tabName === 'quiz') {
                document.getElementById('quizSection').style.display = 'block';
                document.getElementById('bankSection').style.display = 'none';
            } else {
                document.getElementById('quizSection').style.display = 'none';
                document.getElementById('bankSection').style.display = 'block';
                updateWordList();
                updateStats();
            }
        }
        
        // 从localStorage加载题库
        function loadWordDatabase() {
            const saved = localStorage.getItem('englishQuizWords');
            if (saved) {
                try {
                    wordDatabase = JSON.parse(saved);
                } catch (e) {
                    console.error('加载题库失败:', e);
                }
            }
        }
        
        // 保存题库到localStorage
        function saveWordDatabase() {
            localStorage.setItem('englishQuizWords', JSON.stringify(wordDatabase));
        }
        
        // 更新统计信息
        function updateStats() {
            document.getElementById('totalWords').textContent = wordDatabase.length;
            document.getElementById('usedWords').textContent = selectedWords.length;
        }
        
        // 添加单个单词
        function addSingleWord() {
            const word = document.getElementById('newWord').value.trim();
            const meaning = document.getElementById('newMeaning').value.trim();
            const optionsInput = document.getElementById('newOptions').value.trim();
            
            if (!word || !meaning || !optionsInput) {
                alert('请填写完整信息！');
                return;
            }
            
            const options = optionsInput.split(',').map(opt => opt.trim()).filter(opt => opt);
            
            if (options.length < 3) {
                alert('至少需要3个干扰选项！');
                return;
            }
            
            // 检查是否已存在
            if (wordDatabase.some(item => item.word.toLowerCase() === word.toLowerCase())) {
                alert('该单词已存在！');
                return;
            }
            
            wordDatabase.push({ word, meaning, options });
            saveWordDatabase();
            
            // 清空表单
            document.getElementById('newWord').value = '';
            document.getElementById('newMeaning').value = '';
            document.getElementById('newOptions').value = '';
            
            // 显示成功信息
            showSuccessMessage('单词添加成功！');
            updateWordList();
            updateStats();
        }
        
        // 批量添加单词
        function addBatchWords() {
            const batchInput = document.getElementById('batchInput').value.trim();
            
            if (!batchInput) {
                alert('请输入要添加的单词数据！');
                return;
            }
            
            const lines = batchInput.split('\n');
            let addedCount = 0;
            let errorCount = 0;
            
            lines.forEach(line => {
                const parts = line.split(',').map(part => part.trim());
                
                if (parts.length >= 4) {
                    const word = parts[0];
                    const meaning = parts[1];
                    const options = parts.slice(2, 5).filter(opt => opt);
                    
                    if (word && meaning && options.length >= 3) {
                        // 检查是否已存在
                        if (!wordDatabase.some(item => item.word.toLowerCase() === word.toLowerCase())) {
                            wordDatabase.push({ word, meaning, options });
                            addedCount++;
                        } else {
                            errorCount++;
                        }
                    } else {
                        errorCount++;
                    }
                } else {
                    errorCount++;
                }
            });
            
            saveWordDatabase();
            
            // 清空输入框
            document.getElementById('batchInput').value = '';
            
            // 显示结果
            if (addedCount > 0) {
                showSuccessMessage(`成功添加 ${addedCount} 个单词！${errorCount > 0 ? `（${errorCount} 个格式错误）` : ''}`);
            } else {
                alert('没有成功添加任何单词，请检查格式！');
            }
            
            updateWordList();
            updateStats();
        }
        
        // 显示成功信息
        function showSuccessMessage(message) {
            const existing = document.querySelector('.success-box');
            if (existing) {
                existing.remove();
            }
            
            const successBox = document.createElement('div');
            successBox.className = 'success-box';
            successBox.textContent = message;
            
            const bankForm = document.querySelector('.bank-form');
            bankForm.parentNode.insertBefore(successBox, bankForm);
            
            setTimeout(() => {
                successBox.remove();
            }, 3000);
        }
        
        // 更新单词列表显示
        function updateWordList() {
            const wordList = document.getElementById('wordList');
            wordList.innerHTML = '';
            
            if (wordDatabase.length === 0) {
                wordList.innerHTML = '<p style="text-align: center; color: #a0aec0;">暂无单词</p>';
                return;
            }
            
            wordDatabase.forEach((item, index) => {
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item';
                wordItem.innerHTML = `
                    <div class="word-info">
                        <div class="word-text">${item.word}</div>
                        <div class="word-meaning">中文：${item.meaning}</div>
                        <div class="word-options">选项：${item.options.join(', ')}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteWord(${index})" title="删除">×</button>
                `;
                wordList.appendChild(wordItem);
            });
        }
        
        // 删除单词
        function deleteWord(index) {
            if (confirm('确定要删除这个单词吗？')) {
                wordDatabase.splice(index, 1);
                saveWordDatabase();
                updateWordList();
                updateStats();
            }
        }
        
        // 清空题库
        function clearAllWords() {
            if (confirm('确定要清空整个题库吗？此操作不可恢复！')) {
                wordDatabase = [];
                saveWordDatabase();
                updateWordList();
                updateStats();
                showSuccessMessage('题库已清空！');
            }
        }
        
        // 初始化测验
        function initQuiz() {
            // 随机选择10个单词
            selectedWords = getRandomWords(10);
            currentQuestion = 0;
            score = 0;
            answered = false;
            
            // 显示第一个问题
            showQuestion();
            
            // 隐藏结果页面
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
        }
        
        // 随机获取指定数量的单词
        function getRandomWords(count) {
            const shuffled = [...wordDatabase].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, Math.min(count, shuffled.length));
        }
        
        // 显示当前问题
        function showQuestion() {
            answered = false;
            const word = selectedWords[currentQuestion];
            
            // 更新进度条
            updateProgressBar();
            
            // 显示单词
            document.getElementById('wordDisplay').textContent = word.word;
            
            // 创建选项按钮
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            // 随机打乱选项顺序
            const shuffledOptions = [...word.options].sort(() => 0.5 - Math.random());
            
            shuffledOptions.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option;
                button.onclick = () => checkAnswer(option, word.meaning);
                optionsContainer.appendChild(button);
            });
            
            // 清除反馈信息
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            
            // 隐藏下一题按钮
            document.getElementById('nextBtn').style.display = 'none';
        }
        
        // 检查答案
        function checkAnswer(selected, correct) {
            if (answered) return;
            
            answered = true;
            const buttons = document.querySelectorAll('.option-btn');
            const feedback = document.getElementById('feedback');
            
            buttons.forEach(button => {
                button.disabled = true;
                
                if (button.textContent === correct) {
                    button.classList.add('correct');
                } else if (button.textContent === selected && selected !== correct) {
                    button.classList.add('incorrect');
                }
            });
            
            // 显示反馈信息
            if (selected === correct) {
                score++;
                feedback.textContent = '🎉 正确！';
                feedback.classList.add('correct');
            } else {
                feedback.textContent = `❌ 错误！正确答案是：${correct}`;
                feedback.classList.add('incorrect');
            }
            
            // 显示下一题按钮或结束测验
            if (currentQuestion < selectedWords.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                setTimeout(showResult, 1500);
            }
        }
        
        // 下一题
        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }
        
        // 更新进度条
        function updateProgressBar() {
            const progress = ((currentQuestion + 1) / selectedWords.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        // 显示结果
        function showResult() {
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            
            const percentage = (score / selectedWords.length) * 100;
            document.getElementById('finalScore').textContent = `${score} / ${selectedWords.length}`;
            
            // 根据分数显示不同的消息
            let message = '';
            let starsCount = 0;
            
            if (percentage >= 90) {
                message = '🌟 太棒了！你是英语小天才！';
                starsCount = 5;
            } else if (percentage >= 80) {
                message = '🌟 很棒！继续加油！';
                starsCount = 4;
            } else if (percentage >= 70) {
                message = '👍 不错！再接再厉！';
                starsCount = 3;
            } else if (percentage >= 60) {
                message = '👌 还可以，继续努力！';
                starsCount = 2;
            } else {
                message = '💪 别灰心，再试一次吧！';
                starsCount = 1;
            }
            
            document.getElementById('scoreMessage').textContent = message;
            
            // 显示星星
            const starsContainer = document.getElementById('stars');
            starsContainer.innerHTML = '';
            for (let i = 0; i < starsCount; i++) {
                starsContainer.innerHTML += '<span class="star">⭐</span>';
            }
        }
        
        // 重新开始测验
        function restartQuiz() {
            initQuiz();
        }
        
        // 页面加载完成后初始化
        window.onload = function() {
            loadWordDatabase();
            initQuiz();
        };
    </script>
</body>
</html>
