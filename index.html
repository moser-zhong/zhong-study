        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: manipulation; /* 优化手机点击响应 */
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:active {
            transform: scale(0.98);
        }

        .option-btn {
            transition: all 0.2s;
            min-height: 56px; /* 适合手指点击的高度 */
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .option-btn.correct {
            background-color: #86efac !important;
            border-color: #22c55e !important;
            color: #14532d !important;
        }
        .option-btn.wrong {
            background-color: #fca5a5 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }

<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-700">

                    <h2 class="text-2xl sm:text-3xl font-extrabold text-blue-600 mb-2">準備好挑戰了嗎？</h2>
                    <p class="text-gray-500 text-sm sm:text-base">選擇一個主題開始測驗，答錯的題目會在最後複習</p>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-2 gap-3 sm:gap-4">
                    <button onclick="app.startQuiz('animal')" class="card-hover bg-green-100 hover:bg-green-200 border-2 border-green-300 p-4 sm:p-6 rounded-2xl text-center group">
                        <div class="text-3xl sm:text-4xl mb-2 group-hover:scale-110 transition">🐯</div>
                        <h3 class="font-bold text-green-800 text-base sm:text-lg">動物昆蟲</h3>
                    </button>
                    <button onclick="app.startQuiz('clothes')" class="card-hover bg-yellow-100 hover:bg-yellow-200 border-2 border-yellow-300 p-4 sm:p-6 rounded-2xl text-center group">

                        <h3 class="font-bold text-yellow-800 text-base sm:text-lg">衣服配件</h3>
                    </button>
                    <button onclick="app.startQuiz('color')" class="card-hover bg-purple-100 hover:bg-purple-200 border-2 border-purple-300 p-4 sm:p-6 rounded-2xl text-center group">
                        <div class="text-3xl sm:text-4xl mb-2 group-hover:scale-110 transition">🎨</div>
                        <h3 class="font-bold text-purple-800 text-base sm:text-lg">各種顏色</h3>
                    </button>
                    <button onclick="app.startQuiz('family')" class="card-hover bg-pink-100 hover:bg-pink-200 border-2 border-pink-300 p-4 sm:p-6 rounded-2xl text-center group">
                        <div class="text-3xl sm:text-4xl mb-2 group-hover:scale-110 transition">👨‍👩‍👧‍👦</div>
                        <h3 class="font-bold text-pink-800 text-base sm:text-lg">家庭成員</h3>
                    </button>
                    <button onclick="app.startQuiz('food')" class="card-hover bg-orange-100 hover:bg-orange-200 border-2 border-orange-300 p-4 sm:p-6 rounded-2xl text-center group">

                        <h3 class="font-bold text-orange-800 text-base sm:text-lg">食物飲料</h3>

                    </button>
                </div>

                <div id="options-container" class="grid grid-cols-1 gap-3"></div>

                <div id="feedback-msg" class="hidden text-center p-4 rounded-xl font-bold text-lg animate-bounce-in"></div>
                
                <div class="flex justify-end pt-4">
                    <button id="next-btn" onclick="app.nextQuestion()" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition transform hover:scale-105 w-full sm:w-auto">
                        下一題 <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

                        🏆
                    </div>

            { word: "TV", meaning: "電視", category: "house" },
            { word: "towel", meaning: "毛巾", category: "house" },
            { word: "wall", meaning: "牆壁", category: "house" },
            { word: "wash", meaning: "洗", category: "house" },
            { word: "window", meaning: "窗戶", category: "house" },

            // 数字/金额
            { word: "all", meaning: "全部", category: "number" },
            { word: "both", meaning: "兩者都", category: "number" },
            { word: "eight", meaning: "八", category: "number" },
            { word: "eighteen", meaning: "十八", category: "number" },
            { word: "eighty", meaning: "八十", category: "number" },
            { word: "eleven", meaning: "十一", category: "number" },
            { word: "fifteen", meaning: "十五", category: "number" },
            { word: "fifty", meaning: "五十", category: "number" },
            { word: "first", meaning: "第一", category: "number" },
            { word: "five", meaning: "五", category: "number" },
            { word: "forty", meaning: "四十", category: "number" },
            { word: "four", meaning: "四", category: "number" },
            { word: "fourteen", meaning: "十四", category: "number" },
            { word: "nine", meaning: "九", category: "number" },
            { word: "nineteen", meaning: "十九", category: "number" },
            { word: "ninety", meaning: "九十", category: "number" },
            { word: "one", meaning: "一", category: "number" },
            { word: "second", meaning: "第二", category: "number" },
            { word: "seven", meaning: "七", category: "number" },
            { word: "seventeen", meaning: "十七", category: "number" },
            { word: "seventy", meaning: "七十", category: "number" },
            { word: "six", meaning: "六", category: "number" },
            { word: "sixteen", meaning: "十六", category: "number" },
            { word: "sixty", meaning: "六十", category: "number" },
            { word: "ten", meaning: "十", category: "number" },
            { word: "third", meaning: "第三", category: "number" },
            { word: "thirteen", meaning: "十三", category: "number" },
            { word: "thirty", meaning: "三十", category: "number" },
            { word: "three", meaning: "三", category: "number" },
            { word: "twelve", meaning: "十二", category: "number" },
            { word: "twenty", meaning: "二十", category: "number" },
            { word: "two", meaning: "二", category: "number" }
        ];

        // ==========================================
        // 第二部分：应用逻辑层 (Application Logic)
        // 负责状态管理、持久化存储和交互控制
        // ==========================================
        const app = {
            state: {
                currentQuestions: [],
                currentIndex: 0,
                score: 0,
                wrongAnswers: [],
                isReviewMode: false,
                quizId: null // 用于 localStorage 恢复进度
            },

            init() {
                this.checkSavedProgress();
            },

            // 工具函数：洗牌算法
            shuffle(array) {
                return array.sort(() => Math.random() - 0.5);
            },

            // 工具函数：生成唯一ID
            generateId() {
                return Date.now().toString(36) + Math.random().toString(36).substr(2);
            },

            // 核心功能：开始测验
            startQuiz(category) {
                let pool = [];
                if (category === 'mixed') {
                    pool = [...QUESTION_BANK];
                } else {
                    pool = QUESTION_BANK.filter(q => q.category === category);
                }

                // 随机抽取题目，如果是混合模式则最多50题，其他模式全量或限制数量
                let selected = this.shuffle([...pool]);
                if (category === 'mixed') {
                    selected = selected.slice(0, 50);
                } else if (selected.length > 20) {
                    selected = selected.slice(0, 20); // 分类测验限制20题以免太长
                }

                this.state.currentQuestions = selected.map(q => ({
                    ...q,
                    id: this.generateId(),
                    options: this.generateOptions(q)
                }));
                
                this.state.currentIndex = 0;
                this.state.score = 0;
                this.state.wrongAnswers = [];
                this.state.isReviewMode = false;
                this.state.quizId = this.generateId();

                this.saveProgress();
                this.renderQuizScreen();
            },

            // 生成干扰选项
            generateOptions(correctItem) {
                const others = QUESTION_BANK.filter(q => q.word !== correctItem.word);
                const shuffledOthers = this.shuffle(others).slice(0, 3);
                const options = [...shuffledOthers, correctItem];
                return this.shuffle(options);
            },

            // 渲染测验界面
            renderQuizScreen() {
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');

                this.updateProgressBar();
                this.loadQuestion();
            },

            // 加载当前题目
            loadQuestion() {
                const q = this.state.currentQuestions[this.state.currentIndex];
                document.getElementById('question-word').textContent = q.word;
                document.getElementById('current-q-num').textContent = this.state.currentIndex + 1;
                document.getElementById('total-q-num').textContent = this.state.currentQuestions.length;
                
                const container = document.getElementById('options-container');
                container.innerHTML = '';
                
                document.getElementById('feedback-msg').classList.add('hidden');
                document.getElementById('next-btn').classList.add('hidden');

                q.options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full bg-white border-2 border-gray-200 rounded-xl p-4 text-lg font-semibold text-gray-700 hover:border-blue-300 hover:bg-blue-50';
                    btn.textContent = opt.meaning;
                    btn.onclick = () => this.handleAnswer(btn, opt, q);
                    container.appendChild(btn);
                });

                this.saveProgress();
            },

            // 处理答题
            handleAnswer(btn, selectedOpt, correctQ) {
                // 禁用所有按钮
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.disabled = true);

                const isCorrect = selectedOpt.word === correctQ.word;
                const feedback = document.getElementById('feedback-msg');
                feedback.classList.remove('hidden');

                if (isCorrect) {
                    btn.classList.add('correct');
                    this.state.score++;
                    feedback.textContent = '🎉 答對了！好棒！';
                    feedback.className = 'text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-green-100 text-green-700';
                } else {
                    btn.classList.add('wrong');
                    // 高亮正确答案
                    buttons.forEach(b => {
                        if (b.textContent === correctQ.meaning) b.classList.add('correct');
                    });
                    this.state.wrongAnswers.push(correctQ);
                    feedback.textContent = `😅 答錯了，正確答案是：${correctQ.meaning}`;
                    feedback.className = 'text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-red-100 text-red-700';
                }

                document.getElementById('next-btn').classList.remove('hidden');
                this.saveProgress();
            },

            // 下一题
            nextQuestion() {
                this.state.currentIndex++;
                if (this.state.currentIndex < this.state.currentQuestions.length) {
                    this.loadQuestion();
                } else {
                    this.finishQuiz();
                }
            },

            // 更新进度条
            updateProgressBar() {
                const percent = ((this.state.currentIndex) / this.state.currentQuestions.length) * 100;
                document.getElementById('progress-bar').style.width = `${percent}%`;
            },

            // 结束测验
            finishQuiz() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                document.getElementById('final-score').textContent = this.state.score;
                document.getElementById('final-total').textContent = this.state.currentQuestions.length;
                
                const percentage = (this.state.score / this.state.currentQuestions.length) * 100;
                const comment = document.getElementById('score-comment');
                if (percentage === 100) comment.textContent = "太厲害了！滿分！🌟";
                else if (percentage >= 80) comment.textContent = "做得很好！繼續保持！👍";
                else if (percentage >= 60) comment.textContent = "不錯喔！再加油一點！💪";
                else comment.textContent = "別灰心，多練習幾次就會了！📚";

                // 显示/隐藏复习按钮
                const reviewBtn = document.getElementById('review-btn');
                if (this.state.wrongAnswers.length > 0) {
                    reviewBtn.classList.remove('hidden');
                    reviewBtn.innerHTML = `<i class="fa-solid fa-book-open"></i> 錯題複習 (${this.state.wrongAnswers.length})`;
                } else {
                    reviewBtn.classList.add('hidden');
                }
                
                document.getElementById('review-section').classList.add('hidden');
                
                // 清除已完成的进度保存
                localStorage.removeItem('englishQuizProgress');
            },

            // 显示错题复习
            showReview() {
                const section = document.getElementById('review-section');
                section.classList.remove('hidden');
                const list = document.getElementById('review-list');
                list.innerHTML = '';

                this.state.wrongAnswers.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bg-orange-50 border border-orange-200 rounded-lg p-3 flex justify-between items-center cursor-pointer hover:bg-orange-100 transition';
                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-orange-800 text-lg">${item.word}</span>
                            <span class="text-gray-600 ml-2">${item.meaning}</span>
                        </div>
                        <i class="fa-solid fa-volume-high text-orange-400"></i>
                    `;
                    div.onclick = () => this.speakText(item.word);
                    list.appendChild(div);
                });
                
                // 滚动到底部
                setTimeout(() => {
                    section.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            },

            // 语音播放
            speakWord() {
                const word = document.getElementById('question-word').textContent;
                this.speakText(word);
            },

            speakText(text) {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.8; // 稍微慢一点适合小学生
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("您的瀏覽器不支持語音功能");
                }
            },

            // 本地存储：保存进度
            saveProgress() {
                const data = {
                    timestamp: Date.now(),
                    state: this.state
                };
                localStorage.setItem('englishQuizProgress', JSON.stringify(data));
            },

            // 本地存储：检查并恢复进度
            checkSavedProgress() {
                const saved = localStorage.getItem('englishQuizProgress');
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        // 如果保存时间在24小时内，且测验未完成（currentIndex < total）
                        if (Date.now() - data.timestamp < 24 * 60 * 60 * 1000) {
                            const s = data.state;
                            if (s.currentQuestions && s.currentIndex < s.currentQuestions.length) {
                                if (confirm("檢測到您上次有未完成的測驗，是否繼續？")) {
                                    this.state = s;
                                    this.renderQuizScreen();
                                    return;
                                }
                            }
                        }
                    } catch (e) {
                        console.error("恢復進度失敗", e);
                    }
                }
            },

            // 重置应用
            resetApp() {
                localStorage.removeItem('englishQuizProgress');
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
                this.state = {
                    currentQuestions: [],
                    currentIndex: 0,
                    score: 0,
                    wrongAnswers: [],
                    isReviewMode: false,
                    quizId: null
                };
            }
        };

        // 启动应用
        window.onload = () => app.init();
    </script>
</body>
