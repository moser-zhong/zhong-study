
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快樂學英文 - 單字測驗與複習</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        .option-btn {
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }
        .option-btn.correct {
            background-color: #86efac !important; /* green-300 */
            border-color: #22c55e !important;
            color: #14532d !important;
        }
        .option-btn.wrong {
            background-color: #fca5a5 !important; /* red-300 */
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        /* 動畫效果 */
        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall linear forwards;
        }
        @keyframes fall {
            to { transform: translateY(100vh) rotate(720deg); }
        }
        
        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-700">

    <!-- 主容器 -->
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100 relative">
        
        <!-- 頂部導航/標題 -->
        <header class="bg-blue-500 p-6 text-white flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fa-solid fa-graduation-cap text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold">快樂學英文</h1>
                    <p class="text-blue-100 text-sm">小學生單字挑戰賽</p>
                </div>
            </div>
            <button onclick="app.resetApp()" class="bg-white/20 hover:bg-white/30 text-white px-4 py-2 rounded-full text-sm font-semibold transition">
                <i class="fa-solid fa-house mr-1"></i> 首頁

        </header>

        <!-- 內容區域 -->

                    <h2 class="text-3xl font-extrabold text-blue-600 mb-2">準備好挑戰了嗎？</h2>
                    <p class="text-gray-500">選擇一個難度開始測驗，答錯的題目會在最後複習哦！</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="app.startQuiz('easy')" class="card-hover bg-green-100 hover:bg-green-200 border-2 border-green-300 p-6 rounded-2xl text-center group">
                        <div class="text-4xl mb-2 group-hover:scale-110 transition">🌱</div>
                        <h3 class="font-bold text-green-800 text-lg">基礎篇</h3>
                        <p class="text-green-600 text-sm">簡單常見單字</p>
                    </button>
                    <button onclick="app.startQuiz('medium')" class="card-hover bg-yellow-100 hover:bg-yellow-200 border-2 border-yellow-300 p-6 rounded-2xl text-center group">
                        <div class="text-4xl mb-2 group-hover:scale-110 transition">🚀</div>
                        <h3 class="font-bold text-yellow-800 text-lg">進階篇</h3>
                        <p class="text-yellow-600 text-sm">學校常用單字</p>
                    </button>
                    <button onclick="app.startQuiz('hard')" class="card-hover bg-purple-100 hover:bg-purple-200 border-2 border-purple-300 p-6 rounded-2xl text-center group">
                        <div class="text-4xl mb-2 group-hover:scale-110 transition">👑</div>
                        <h3 class="font-bold text-purple-800 text-lg">挑戰篇</h3>
                        <p class="text-purple-600 text-sm">較長或複雜單字</p>
                    </button>
                    <button onclick="app.startQuiz('mixed')" class="card-hover bg-blue-100 hover:bg-blue-200 border-2 border-blue-300 p-6 rounded-2xl text-center group">
                        <div class="text-4xl mb-2 group-hover:scale-110 transition">🎲</div>
                        <h3 class="font-bold text-blue-800 text-lg">綜合大挑戰</h3>
                        <p class="text-blue-600 text-sm">隨機50題混合測驗</p>
                    </button>
                </div>
            </div>

            <!-- 2. 測驗畫面 -->
            <div id="quiz-screen" class="hidden space-y-6">
                <!-- 進度條 -->
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm font-bold text-blue-500">進度</span>
                    <span class="text-sm font-bold text-blue-500"><span id="current-q-num">1</span> / <span id="total-q-num">10</span></span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-4 overflow-hidden">
                    <div id="progress-bar" class="bg-blue-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>

                <!-- 題目卡片 -->
                <div class="bg-blue-50 rounded-2xl p-8 text-center border-2 border-blue-100 relative">
                    <span class="absolute top-4 right-4 text-4xl opacity-20">?</span>
                    <h3 class="text-gray-500 text-sm uppercase tracking-wider font-bold mb-2">請選出正確的中文意思</h3>
                    <h2 id="question-word" class="text-5xl font-black text-blue-600 mb-4 break-words">Apple</h2>
                    <button onclick="app.speakWord()" class="bg-white border border-blue-200 text-blue-500 px-4 py-2 rounded-full hover:bg-blue-50 transition shadow-sm">
                        <i class="fa-solid fa-volume-high mr-2"></i> 聽發音
                    </button>
                </div>

                <!-- 選項區域 -->
                <div id="options-container" class="grid grid-cols-1 gap-3">
                    <!-- 選項由 JS 生成 -->
                </div>

                <!-- 反饋訊息 (預設隱藏) -->
                <div id="feedback-msg" class="hidden text-center p-4 rounded-xl font-bold text-lg animate-bounce-in"></div>
                
                <div class="flex justify-end pt-4">
                    <button id="next-btn" onclick="app.nextQuestion()" class="hidden bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold shadow-lg transition transform hover:scale-105">
                        下一題 <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </div>
            </div>

            <!-- 3. 結果與複習畫面 -->
            <div id="result-screen" class="hidden text-center space-y-6 animate-bounce-in">
                <div class="mb-6">
                    <div class="inline-block p-4 rounded-full bg-yellow-100 text-6xl mb-4 shadow-inner">
                        🏆
                    </div>
                    <h2 class="text-3xl font-bold text-gray-800">測驗完成！</h2>
                    <p class="text-gray-500 mt-2">你的得分是</p>
                    <div class="text-6xl font-black text-blue-600 my-4">
                        <span id="final-score">0</span><span class="text-2xl text-gray-400">/<span id="final-total">0</span></span>
                    </div>
                    <p id="score-comment" class="text-lg font-medium text-purple-600"></p>
                </div>

                <!-- 操作按鈕 -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button id="review-btn" onclick="app.showReview()" class="flex-1 bg-orange-500 hover:bg-orange-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-book-open"></i> 錯題複習
                    </button>
                    <button onclick="app.resetApp()" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-rotate-right"></i> 再測一次
                    </button>
                </div>

                <!-- 複習區域 (預設隱藏) -->
                <div id="review-section" class="hidden mt-8 border-t-2 border-dashed border-gray-200 pt-6 text-left">
                    <h3 class="text-xl font-bold text-gray-700 mb-4 flex items-center">
                        <i class="fa-solid fa-clipboard-list text-orange-500 mr-2"></i> 
                        重點複習 <span class="text-sm font-normal text-gray-400 ml-2">(點擊卡片可聽發音)</span>
                    </h3>
                    <div id="review-list" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        <!-- 複習項目由 JS 生成 -->
                    </div>
                </div>
            </div>

        </main>

        <!-- 頁腳 -->
        <footer class="bg-gray-50 p-4 text-center text-gray-400 text-xs border-t border-gray-100">
            &copy; 2026 快樂學英文 | 專為小學生設計
        </footer>
    </div>

        const app = {
            currentQuestions: [],
            currentIndex: 0,
            score: 0,
            wrongAnswers: [], // 儲存答錯的題目用於複習
            isAnswering: false,

            // 初始化
            init: function() {
                this.resetApp();
            },

            // 重置應用狀態
            resetApp: function() {
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('review-section').classList.add('hidden');
                this.score = 0;
                this.wrongAnswers = [];
                this.currentIndex = 0;
            },

            // 開始測驗
            startQuiz: function(difficulty) {
                let filtered = [];
                
                if (difficulty === 'mixed') {
                    // 綜合模式：複製整個題庫，隨機排序，取前50題（若題庫不足則取全部）
                    filtered = [...questionBank].sort(() => 0.5 - Math.random());
                    // 如果題庫超過50題，截取50題；若不足則全部使用
                    if (filtered.length > 50) {
                        filtered = filtered.slice(0, 50);
                    }
                } else {
                    // 分類模式
                    filtered = questionBank.filter(q => q.difficulty === difficulty);
                    // 如果題目太少，混合其他難度補充
                    if (filtered.length < 5) {
                        filtered = filtered.concat(questionBank.filter(q => q.difficulty !== difficulty));
                    }
                    // 洗牌算法並取10題
                    filtered = filtered.sort(() => 0.5 - Math.random()).slice(0, 10);
                }
                
                this.currentQuestions = filtered;
                this.currentIndex = 0;
                this.score = 0;
                this.wrongAnswers = [];
                
                // 切換畫面
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                
                this.renderQuestion();
            },

            // 渲染當前題目
            renderQuestion: function() {
                const q = this.currentQuestions[this.currentIndex];
                this.isAnswering = true;

                // 更新進度
                document.getElementById('current-q-num').textContent = this.currentIndex + 1;
                document.getElementById('total-q-num').textContent = this.currentQuestions.length;
                const progressPercent = ((this.currentIndex) / this.currentQuestions.length) * 100;
                document.getElementById('progress-bar').style.width = `${progressPercent}%`;

                // 更新題目內容
                document.getElementById('question-word').textContent = q.word;
                
                // 清空並生成選項
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';
                
                // 打亂選項順序
                const shuffledOptions = [...q.options].sort(() => 0.5 - Math.random());

                shuffledOptions.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full bg-white border-2 border-gray-200 text-gray-700 font-bold py-4 px-6 rounded-xl text-lg hover:border-blue-400 hover:text-blue-600 shadow-sm';
                    btn.textContent = opt;
                    btn.onclick = () => this.checkAnswer(btn, opt, q.meaning);
                    optionsContainer.appendChild(btn);
                });

                // 隱藏反饋和下一題按鈕
                document.getElementById('feedback-msg').classList.add('hidden');
                document.getElementById('next-btn').classList.add('hidden');
            },

            // 檢查答案
            checkAnswer: function(btnElement, selectedMeaning, correctMeaning) {
                if (!this.isAnswering) return;
                this.isAnswering = false;

                const isCorrect = selectedMeaning === correctMeaning;
                const allBtns = document.querySelectorAll('.option-btn');
                const feedbackEl = document.getElementById('feedback-msg');

                // 鎖定所有按鈕
                allBtns.forEach(btn => btn.disabled = true);

                if (isCorrect) {
                    this.score++;
                    btnElement.classList.add('correct');
                    feedbackEl.textContent = "🎉 答對了！好棒！";
                    feedbackEl.className = "text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-green-100 text-green-700 block";
                } else {
                    btnElement.classList.add('wrong');
                    // 找出正確答案並標記
                    allBtns.forEach(btn => {
                        if (btn.textContent === correctMeaning) {
                            btn.classList.add('correct');
                        }
                    });
                    feedbackEl.textContent = `😅 答錯了，正確答案是：${correctMeaning}`;
                    feedbackEl.className = "text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-red-100 text-red-700 block";
                    
                    // 加入複習清單 (避免重複加入同一題，雖然邏輯上不會發生，但保險起見)
                    if (!this.wrongAnswers.includes(this.currentQuestions[this.currentIndex])) {
                        this.wrongAnswers.push(this.currentQuestions[this.currentIndex]);
                    }
                }

                feedbackEl.classList.remove('hidden');
                document.getElementById('next-btn').classList.remove('hidden');
            },

            // 下一題
            nextQuestion: function() {
                this.currentIndex++;
                if (this.currentIndex < this.currentQuestions.length) {
                    this.renderQuestion();
                } else {
                    this.showResult();
                }
            },

            // 顯示結果
            showResult: function() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('final-total').textContent = this.currentQuestions.length;
                
                // 根據分數給予評語
                const percentage = (this.score / this.currentQuestions.length) * 100;
                const commentEl = document.getElementById('score-comment');
                if (percentage === 100) {
                    commentEl.textContent = "太厲害了！你是英文小天才！🌟";
                    this.triggerConfetti();
                } else if (percentage >= 80) {
                    commentEl.textContent = "表現很棒！繼續保持！💪";
                } else if (percentage >= 60) {
                    commentEl.textContent = "不錯喔！再加油一點點！📚";
                } else {
                    commentEl.textContent = "別灰心，多看幾次就記住囉！❤️";
                }

                // 如果有錯題，顯示複習按鈕提示
                const reviewBtn = document.getElementById('review-btn');
                if (this.wrongAnswers.length > 0) {
                    reviewBtn.classList.remove('hidden');
                    reviewBtn.innerHTML = `<i class="fa-solid fa-book-open"></i> 錯題複習 (${this.wrongAnswers.length})`;
                } else {
                    reviewBtn.classList.add('hidden');
                }
            },

            // 顯示複習區
            showReview: function() {
                const reviewSection = document.getElementById('review-section');
                const reviewList = document.getElementById('review-list');
                
                reviewSection.classList.remove('hidden');
                reviewList.innerHTML = '';

                if (this.wrongAnswers.length === 0) {
                    reviewList.innerHTML = '<p class="text-center text-gray-500 py-4">太棒了！這次沒有錯題需要複習。</p>';
                    return;
                }

                this.wrongAnswers.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bg-orange-50 border border-orange-200 p-4 rounded-xl flex justify-between items-center cursor-pointer hover:bg-orange-100 transition';
                    div.onclick = () => this.speakText(item.word);
                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-orange-800 text-lg">${item.word}</span>
                            <span class="text-gray-500 mx-2">-</span>
                            <span class="text-gray-700">${item.meaning}</span>
                        </div>
                        <i class="fa-solid fa-volume-high text-orange-400"></i>
                    `;
                    reviewList.appendChild(div);
                });
                
                // 滾動到複習區
                reviewSection.scrollIntoView({ behavior: 'smooth' });
            },

            // 語音朗讀 (使用瀏覽器內建 API)
            speakWord: function() {
                const word = document.getElementById('question-word').textContent;
                this.speakText(word);
            },

            speakText: function(text) {
                if ('speechSynthesis' in window) {
                    // 取消之前的發音，避免堆疊
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US'; // 設定為美式英語
                    utterance.rate = 0.8; // 語速稍慢，適合小學生
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("您的瀏覽器不支援語音功能");
                }
            },

            // 簡單的紙花特效
            triggerConfetti: function() {
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'];
                for (let i = 0; i < 50; i++) {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.body.appendChild(confetti);
                    
                    // 動畫結束後移除元素
                    setTimeout(() => confetti.remove(), 4000);
                }
            }
        };

        // 啟動應用
        app.init();
    </script>
</body>
</html>
