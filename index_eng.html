
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>快樂學英文 - 單字測驗與複習</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
            touch-action: manipulation;
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:active {
            transform: scale(0.98);
        }

        .option-btn {
            transition: all 0.2s;
            min-height: 56px;
        }
        .option-btn:active:not(:disabled) {
            transform: scale(0.98);
        }
        .option-btn.correct {
            background-color: #86efac !important;
            border-color: #22c55e !important;
            color: #14532d !important;
        }
        .option-btn.wrong {
            background-color: #fca5a5 !important;
            border-color: #ef4444 !important;
            color: #7f1d1d !important;
        }

        @keyframes bounce-in {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-bounce-in {
            animation: bounce-in 0.5s cubic-bezier(0.215, 0.610, 0.355, 1.000) both;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }

        .game-iframe-container {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            background: #f8fafc;
        }
        .game-timer-overlay {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 text-slate-700">
    <div class="w-full max-w-2xl bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-blue-100 relative flex flex-col" style="min-height: 80vh;">
        <header class="bg-blue-500 p-4 sm:p-6 text-white flex justify-between items-center shrink-0">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-2 rounded-lg">
                    <i class="fa-solid fa-graduation-cap text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-xl sm:text-2xl font-bold">快樂學英文</h1>

            </div>
            <button onclick="app.resetApp()" class="bg-white/20 hover:bg-white/30 text-white px-3 py-2 rounded-full text-sm font-semibold transition">
                <i class="fa-solid fa-house mr-1"></i> <span class="hidden sm:inline">首頁</span>
            </button>
        </header>

        <main class="p-4 sm:p-6 flex-grow flex flex-col justify-center overflow-y-auto custom-scrollbar">

                    <h2 class="text-2xl sm:text-3xl font-extrabold text-blue-600 mb-2">準備好挑戰了嗎？</h2>
                    <p class="text-gray-500 text-sm sm:text-base">選擇一個主題開始測驗，答錯的題目會在最後複習<br/><strong class="text-purple-500">完成100題滿分可解鎖遊戲獎勵哦！🎉</strong></p>
                    
                    <!-- 錯誤題目提示 -->
                    <div id="wrong-questions-hint" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                        <p class="text-red-700 text-sm">
                            <i class="fa-solid fa-exclamation-triangle mr-2"></i>
                            您有 <span id="wrong-count">0</span> 個答錯的題目，這些題目將在下次測驗中優先出現！
                        </p>
                        <button onclick="app.clearWrongQuestions()" class="mt-2 bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm transition">
                            <i class="fa-solid fa-eraser mr-1"></i> 清除錯誤記錄
                        </button>
                    </div>
                </div>
                
                <div class="grid grid-cols-2 sm:grid-cols-2 gap-3 sm:gap-4">
                    <button onclick="app.startQuiz('animal')" class="card-hover bg-green-100 hover:bg-green-200 border-2 border-green-300 p-4 sm:p-6 rounded-2xl text-center group">
                        <div class="text-3xl sm:text-4xl mb-2 group-hover:scale-110 transition">🐯</div>
                        <h3 class="font-bold text-green-800 text-base sm:text-lg">動物昆蟲</h3>
                    </button>
                    <button onclick="app.startQuiz('clothes')" class="card-hover bg-yellow-100 hover:bg-yellow-200 border-2 border-yellow-300 p-4 sm:p-6 rounded-2xl text-center group">
                        <div class="text-3xl sm:text-4xl mb-2 group-hover:scale-110 transition">👕</div>
                        <h3 class="font-bold text-yellow-800 text-base sm:text-lg">衣服配件</h3>
                    </button>
                    <button onclick="app.startQuiz('color')" class="card-hover bg-purple-100 hover:bg-purple-200 border-2 border-purple-300 p-4 sm:p-6 rounded-2xl text-center group">

                        <h3 class="font-bold text-purple-800 text-base sm:text-lg">各種顏色</h3>

                </div>
            </div>
        </main>

        // 适合10岁小朋友的游戏列表 (免费、无需登录、教育或益智类)
        const KID_GAMES = [
            { name: "Minecraft Classic (我的世界)", url: "https://classic.minecraft.net/" },
            { name: "Pac-Man (吃豆人)", url: "https://www.google.com/logos/2010/pacman/ihs.html" },
            { name: "Snake Game (贪吃蛇)", url: "https://playsnake.org/" },
            { name: "2048 Puzzle", url: "https://play2048.co/" },
            { name: "GeoGuessr (简易版)", url: "https://www.geoguessr.com/free" },
            { name: "Quick Draw (AI猜画)", url: "https://quickdraw.withgoogle.com/" },
            { name: "Chess.com (儿童国际象棋)", url: "https://www.chess.com/play/computer" }
        ];

        const app = {
            currentQuestions: [],
            currentIndex: 0,
            score: 0,
            wrongAnswers: [],
            gameTimerInterval: null,
            remainingTime: 1800, // 30 minutes in seconds

            init() {
                this.resetApp();
                // 顯示錯誤題目提示
                this.showWrongQuestionsHint();
            },
            
            // 載入錯誤題目
            loadWrongQuestions() {
                try {
                    const saved = localStorage.getItem('wrongQuestions');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    console.error('載入錯誤題目失敗:', e);
                    return [];
                }
            },
            
            // 保存錯誤題目
            saveWrongQuestions() {
                try {
                    localStorage.setItem('wrongQuestions', JSON.stringify(this.wrongAnswers));
                } catch (e) {
                    console.error('保存錯誤題目失敗:', e);
                }
            },
            
            // 清除錯誤題目
            clearWrongQuestions() {
                try {
                    localStorage.removeItem('wrongQuestions');
                    this.wrongAnswers = [];
                    this.showWrongQuestionsHint();
                    alert('已清除所有錯誤題目記錄！');
                } catch (e) {
                    console.error('清除錯誤題目失敗:', e);
                    alert('清除錯誤題目失敗，請刷新頁面重試！');
                }
            },
            
            // 顯示錯誤題目提示
            showWrongQuestionsHint() {
                const wrongQuestions = this.loadWrongQuestions();
                const hint = document.getElementById('wrong-questions-hint');
                const count = document.getElementById('wrong-count');
                
                if (wrongQuestions.length > 0) {
                    hint.classList.remove('hidden');
                    count.textContent = wrongQuestions.length;
                } else {
                    hint.classList.add('hidden');
                }
            },

            resetApp() {
                this.stopGameTimer();
                document.getElementById('start-screen').classList.remove('hidden');
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('review-section').classList.add('hidden');
                document.getElementById('perfect-reward').classList.add('hidden');
                // 不清除錯誤題目，讓它們在下次測驗中出現
                // this.wrongAnswers = [];
            },

            startQuiz(category) {
                let pool = [];
                
                // 載入之前的錯誤題目
                const wrongQuestions = this.loadWrongQuestions();
                
                if (category === 'mixed') {
                    pool = [...QUESTION_BANK];
                    
                    // 如果有錯誤題目，優先加入題目池
                    if (wrongQuestions.length > 0) {
                        // 將錯誤題目加入題目池的前面
                        pool = [...wrongQuestions, ...pool.filter(q => 
                            !wrongQuestions.some(w => w.word === q.word)
                        )];
                        
                        // 計算還需要多少題
                        const remainingQuestions = 100 - wrongQuestions.length;
                        
                        // 如果還需要更多題目，隨機選取
                        if (remainingQuestions > 0) {
                            const remainingPool = pool.filter(q => 
                                !wrongQuestions.some(w => w.word === q.word)
                            );
                            remainingPool.sort(() => Math.random() - 0.5);
                            pool = [...wrongQuestions, ...remainingPool.slice(0, remainingQuestions)];
                        }
                    } else {
                        // 沒有錯誤題目，正常隨機選取100題
                        pool.sort(() => Math.random() - 0.5);
                        pool = pool.slice(0, 100);
                    }
                } else {
                    pool = QUESTION_BANK.filter(q => q.category === category);
                    
                    // 如果有錯誤題目且屬於當前分類，優先加入
                    const categoryWrongQuestions = wrongQuestions.filter(q => q.category === category);
                    if (categoryWrongQuestions.length > 0) {
                        pool = [...categoryWrongQuestions, ...pool.filter(q => 
                            !categoryWrongQuestions.some(w => w.word === q.word)
                        )];
                        
                        // 如果還需要更多題目，隨機選取
                        const remainingQuestions = Math.min(pool.length, 10) - categoryWrongQuestions.length;
                        if (remainingQuestions > 0) {
                            const remainingPool = pool.filter(q => 
                                !categoryWrongQuestions.some(w => w.word === q.word)
                            );
                            remainingPool.sort(() => Math.random() - 0.5);
                            pool = [...categoryWrongQuestions, ...remainingPool.slice(0, remainingQuestions)];
                        }
                    } else {
                        // 沒有錯誤題目，正常選取
                        pool.sort(() => Math.random() - 0.5);
                        pool = pool.slice(0, Math.min(pool.length, 10));
                    }
                }

                if (pool.length === 0) {
                    alert("該分類暫無題目");
                    return;
                }
                
                this.currentQuestions = pool;

                this.currentIndex = 0;
                this.score = 0;
                this.wrongAnswers = [];
                
                document.getElementById('start-screen').classList.add('hidden');
                document.getElementById('quiz-screen').classList.remove('hidden');
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.add('hidden');
                
                this.renderQuestion();
            },

            renderQuestion() {
                const q = this.currentQuestions[this.currentIndex];
                const total = this.currentQuestions.length;
                
                document.getElementById('current-q-num').textContent = this.currentIndex + 1;
                document.getElementById('total-q-num').textContent = total;
                document.getElementById('progress-bar').style.width = `${((this.currentIndex) / total) * 100}%`;
                document.getElementById('question-word').textContent = q.word;
                document.getElementById('feedback-msg').classList.add('hidden');
                document.getElementById('next-btn').classList.add('hidden');

                // Generate options
                const optionsContainer = document.getElementById('options-container');
                optionsContainer.innerHTML = '';

                // Get 3 random wrong answers
                let distractors = QUESTION_BANK.filter(item => item.meaning !== q.meaning);
                distractors.sort(() => Math.random() - 0.5);
                let options = [q, ...distractors.slice(0, 3)];
                options.sort(() => Math.random() - 0.5);

                options.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn w-full bg-white border-2 border-gray-200 rounded-xl p-4 text-lg font-semibold text-gray-700 hover:border-blue-400 hover:bg-blue-50';
                    btn.textContent = opt.meaning;
                    btn.onclick = () => this.checkAnswer(btn, opt, q);
                    optionsContainer.appendChild(btn);
                });
            },

            speakWord() {
                const word = this.currentQuestions[this.currentIndex].word;
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            },

            checkAnswer(btn, selected, correct) {
                // Disable all buttons
                const buttons = document.querySelectorAll('.option-btn');
                buttons.forEach(b => b.disabled = true);

                const feedback = document.getElementById('feedback-msg');
                feedback.classList.remove('hidden');

                if (selected.meaning === correct.meaning) {
                    btn.classList.add('correct');
                    this.score++;
                    feedback.textContent = "✅ 答對了！太棒了！";
                    feedback.className = "text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-green-100 text-green-700";
                } else {
                    btn.classList.add('wrong');
                    // Highlight correct one
                    buttons.forEach(b => {
                        if (b.textContent === correct.meaning) b.classList.add('correct');
                    });
                    feedback.textContent = `❌ 答錯了，正確答案是：${correct.meaning}`;
                    feedback.className = "text-center p-4 rounded-xl font-bold text-lg animate-bounce-in bg-red-100 text-red-700";
                    
                    // Add to wrong answers for review
                    if (!this.wrongAnswers.find(w => w.word === correct.word)) {
                        this.wrongAnswers.push(correct);
                    }
                }

                document.getElementById('next-btn').classList.remove('hidden');
            },

            nextQuestion() {
                this.currentIndex++;
                if (this.currentIndex < this.currentQuestions.length) {
                    this.renderQuestion();
                } else {
                    this.showResult();
                }
            },

            showResult() {
                document.getElementById('quiz-screen').classList.add('hidden');
                document.getElementById('result-screen').classList.remove('hidden');
                
                const total = this.currentQuestions.length;
                document.getElementById('final-score').textContent = this.score;
                document.getElementById('final-total').textContent = total;
                
                // 保存錯誤題目供下次測驗使用
                this.saveWrongQuestions();
                
                const percentage = (this.score / total) * 100;
                const comment = document.getElementById('score-comment');
                const reward = document.getElementById('perfect-reward');
                const reviewBtn = document.getElementById('review-btn');

                if (percentage === 100) {
                    comment.textContent = "完美！你是英文小天才！🌟";
                    reward.classList.remove('hidden');
                } else if (percentage >= 80) {
                    comment.textContent = "非常優秀！繼續保持！💪";
                    reward.classList.add('hidden');
                } else if (percentage >= 60) {
                    comment.textContent = "不錯哦，再加油一點！📚";
                    reward.classList.add('hidden');
                } else {
                    comment.textContent = "別灰心，多複習幾次就會了！❤️";
                    reward.classList.add('hidden');
                }

                if (this.wrongAnswers.length > 0) {
                    reviewBtn.classList.remove('hidden');
                } else {
                    reviewBtn.classList.add('hidden');
                    document.getElementById('review-section').classList.add('hidden');
                }
            },

            showReview() {
                const section = document.getElementById('review-section');
                const list = document.getElementById('review-list');
                section.classList.remove('hidden');
                list.innerHTML = '';

                this.wrongAnswers.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-orange-50 border border-orange-200 p-3 rounded-lg flex justify-between items-center cursor-pointer hover:bg-orange-100 transition";
                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-orange-800 text-lg">${item.word}</span>
                            <span class="text-gray-600 ml-2">${item.meaning}</span>
                        </div>
                        <i class="fa-solid fa-volume-high text-orange-400"></i>
                    `;
                    div.onclick = () => {
                        const u = new SpeechSynthesisUtterance(item.word);
                        u.lang = 'en-US';
                        window.speechSynthesis.speak(u);
                    };
                    list.appendChild(div);
                });
                
                // Scroll to review section
                section.scrollIntoView({ behavior: 'smooth' });
            },

            unlockRandomGame() {
                const randomGame = KID_GAMES[Math.floor(Math.random() * KID_GAMES.length)];
                
                // 顯示遊戲信息
                document.getElementById('result-screen').classList.add('hidden');
                document.getElementById('game-screen').classList.remove('hidden');
                document.getElementById('game-title').innerHTML = `<i class="fa-solid fa-gamepad mr-2"></i> ${randomGame.name}`;
                
                // 在新窗口中打開遊戲
                alert(`恭喜！你解鎖了 ${randomGame.name}\n\n遊戲將在新窗口中打開，享受30分鐘的遊戲時間！`);
                window.open(randomGame.url, '_blank', 'noopener,noreferrer');
                
                this.startGameTimer();
            },

            startGameTimer() {
                this.remainingTime = 1800; // 30 mins
                this.updateTimerDisplay();
                this.gameTimerInterval = setInterval(() => {
                    this.remainingTime--;
                    this.updateTimerDisplay();
                    if (this.remainingTime <= 0) {
                        this.exitGame();
                        alert("遊戲時間到！休息一下吧～");
                    }
                }, 1000);
            },

            stopGameTimer() {
                if (this.gameTimerInterval) {
                    clearInterval(this.gameTimerInterval);
                    this.gameTimerInterval = null;
                }
            },

            updateTimerDisplay() {
                const m = Math.floor(this.remainingTime / 60).toString().padStart(2, '0');
                const s = (this.remainingTime % 60).toString().padStart(2, '0');
                const timeStr = `${m}:${s}`;
                document.getElementById('game-timer').textContent = timeStr;
                document.getElementById('overlay-time').textContent = timeStr;
            },

            exitGame() {
                this.stopGameTimer();
                document.getElementById('game-screen').classList.add('hidden');
                document.getElementById('start-screen').classList.remove('hidden');
            }
        };

        // Initialize app with error handling
        window.onload = () => {
            try {
                app.init();
            } catch (e) {
                console.error('應用程序初始化失敗:', e);
                alert('應用程序加載失敗，請刷新頁面重試！');
            }
        };
        
        // Fallback for browsers that don't support localStorage
        if (typeof localStorage === 'undefined') {
            console.warn('localStorage 不支持，錯誤題目功能將被禁用');
            app.loadWrongQuestions = () => [];
            app.saveWrongQuestions = () => {};
            app.clearWrongQuestions = () => {};
        }
    </script>
