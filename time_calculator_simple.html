<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间计算练习题库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .progress-bar {
            background: #f0f0f0;
            height: 8px;
            margin: 20px 30px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .content {
            padding: 30px;
        }

        .tips {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 15px;
            margin: 20px 0;
        }

        .tips h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .tips ul {
            color: #856404;
            margin-left: 20px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #4CAF50;
        }

        .question-title {
            color: #333;
            font-size: 1.3em;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .question-content {
            color: #555;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .answer-section {
            background: white;
            border-radius: 8px;
            padding: 20px;
            border: 2px solid #e0e0e0;
            margin-top: 15px;
        }

        .answer-input {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            min-width: 120px;
        }

        .input-group label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-secondary {
            background: #f44336;
            color: white;
        }

        .btn-secondary:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .feedback {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            display: none;
        }

        .feedback.correct {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .feedback.incorrect {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .stats {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #1976d2;
        }

        .stat-label {
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 600px) {
            .answer-input {
                flex-direction: column;
            }
            
            .input-group {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>时间计算练习题库</h1>
            <p>掌握时间加减法，提升数学计算能力</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressBar"></div>
        </div>

        <div class="content">


            <div id="questionsContainer">
                <!-- 题目将通过JavaScript动态生成 -->
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="correctCount">0</div>
                    <div class="stat-label">正确</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">8</div>
                    <div class="stat-label">总题数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="accuracy">0%</div>
                    <div class="stat-label">正确率</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 题目数据
        const questions = [
            {
                id: 1,
                title: "博物馆参观时间",
                content: "Lily和弟弟参观艺术博物馆，9:35 AM进入，11:30 AM离开。他们在博物馆待了多长时间？",
                unit: "小时分钟",
                answer: { hours: 1, minutes: 55 }
            },
            {
                id: 2,
                title: "烤饼干时间",
                content: "Qiqi从2:05:40 PM开始烤饼干，2:50:10 PM完成。烤饼干花了多长时间？",
                unit: "分钟秒",
                answer: { minutes: 44, seconds: 30 }
            },
            {
                id: 3,
                title: "游乐园营业时间",
                content: "游乐园9:30 AM开门，5:00 PM关门。游乐园营业多长时间？",
                unit: "小时分钟",
                answer: { hours: 7, minutes: 30 }
            },
            {
                id: 4,
                title: "阅读和钢琴练习",
                content: "小芳花了2小时36分钟阅读，弹钢琴花了1小时25分钟。她看书和弹钢琴共花了多长时间？",
                unit: "小时分钟",
                answer: { hours: 4, minutes: 1 }
            },
            {
                id: 5,
                title: "冬至昼夜时间",
                content: "冬至这一天有24小时，夜晚13小时20分钟。白天的时长是多少？",
                unit: "小时分钟",
                answer: { hours: 10, minutes: 40 }
            },
            {
                id: 6,
                title: "接力赛时间比较",
                content: "甲班接力赛用了29分18秒，乙班用了27分31秒。乙班比甲班快多少时间？",
                unit: "分钟秒",
                answer: { minutes: 1, seconds: 47 }
            },
            {
                id: 7,
                title: "维多利亚号邮轮",
                content: "维多利亚号在3月5日上午10时出航，3月8日上午9时靠岸。乘客在邮轮上度过了多长时间？",
                unit: "小时",
                answer: { hours: 71 }
            },
            {
                id: 8,
                title: "苏花公路维修",
                content: "苏花公路在2月20日下午5时开始维修，2月21日上午11时恢复通车。公路封路了多长时间？",
                unit: "小时",
                answer: { hours: 18 }
            }
        ];

        let correctAnswers = 0;
        let totalAttempts = 0;

        // 初始化题目
        function initializeQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';

            questions.forEach((question, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card';
                
                questionDiv.innerHTML = `
                    <div class="question-title">题目 ${index + 1}: ${question.title}</div>
                    <div class="question-content">${question.content}</div>
                    <div class="answer-section">
                        <div class="answer-input">
                            ${getInputFields(question)}
                        </div>
                        <div class="buttons">
                            <button class="btn btn-primary" onclick="checkAnswer(${index})">检查答案</button>
                        </div>
                        <div class="feedback" id="feedback-${index}"></div>
                    </div>
                `;
                container.appendChild(questionDiv);
            });

            updateStats();
        }

        // 获取输入字段
        function getInputFields(question) {
            if (question.unit === '小时分钟') {
                return `
                    <div class="input-group">
                        <label>小时</label>
                        <input type="number" id="hours-${question.id}" min="0" max="23">
                    </div>
                    <div class="input-group">
                        <label>分钟</label>
                        <input type="number" id="minutes-${question.id}" min="0" max="59">
                    </div>
                `;
            } else if (question.unit === '分钟秒') {
                return `
                    <div class="input-group">
                        <label>分钟</label>
                        <input type="number" id="minutes-${question.id}" min="0" max="59">
                    </div>
                    <div class="input-group">
                        <label>秒</label>
                        <input type="number" id="seconds-${question.id}" min="0" max="59">
                    </div>
                `;
            } else if (question.unit === '小时') {
                return `
                    <div class="input-group">
                        <label>小时</label>
                        <input type="number" id="hours-${question.id}" min="0">
                    </div>
                `;
            }
        }

        // 检查答案
        function checkAnswer(questionIndex) {
            const question = questions[questionIndex];
            const feedback = document.getElementById(`feedback-${questionIndex}`);
            let userAnswer = {};
            let isCorrect = false;

            // 获取用户输入
            if (question.unit === '小时分钟') {
                const hoursInput = document.getElementById(`hours-${question.id}`);
                const minutesInput = document.getElementById(`minutes-${question.id}`);
                
                userAnswer.hours = parseInt(hoursInput.value) || 0;
                userAnswer.minutes = parseInt(minutesInput.value) || 0;
                
                isCorrect = userAnswer.hours === question.answer.hours && 
                           userAnswer.minutes === question.answer.minutes;
            } else if (question.unit === '分钟秒') {
                const minutesInput = document.getElementById(`minutes-${question.id}`);
                const secondsInput = document.getElementById(`seconds-${question.id}`);
                
                userAnswer.minutes = parseInt(minutesInput.value) || 0;
                userAnswer.seconds = parseInt(secondsInput.value) || 0;
                
                isCorrect = userAnswer.minutes === question.answer.minutes && 
                           userAnswer.seconds === question.answer.seconds;
            } else if (question.unit === '小时') {
                const hoursInput = document.getElementById(`hours-${question.id}`);
                userAnswer.hours = parseInt(hoursInput.value) || 0;
                isCorrect = userAnswer.hours === question.answer.hours;
            }

            // 更新统计
            totalAttempts++;
            if (isCorrect) {
                correctAnswers++;
                feedback.className = 'feedback correct';
                feedback.innerHTML = `✅ 正确！答案是 ${formatAnswer(question.answer, question.unit)}`;
            } else {
                feedback.className = 'feedback incorrect';
                feedback.innerHTML = `❌ 不正确。正确答案是：${formatAnswer(question.answer, question.unit)}`;
            }

            updateStats();
            updateProgress();
        }



        // 格式化答案
        function formatAnswer(answer, unit) {
            if (unit === '小时分钟') {
                return `${answer.hours}小时${answer.minutes}分钟`;
            } else if (unit === '分钟秒') {
                return `${answer.minutes}分钟${answer.seconds}秒`;
            } else if (unit === '小时') {
                return `${answer.hours}小时`;
            }
        }

        // 更新统计
        function updateStats() {
            document.getElementById('correctCount').textContent = correctAnswers;
            document.getElementById('totalCount').textContent = questions.length;
            const accuracy = totalAttempts > 0 ? Math.round((correctAnswers / totalAttempts) * 100) : 0;
            document.getElementById('accuracy').textContent = accuracy + '%';
        }

        // 更新进度
        function updateProgress() {
            const progress = (correctAnswers / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 页面加载完成后初始化
        window.onload = function() {
            initializeQuestions();
        };
    </script>
</body>
</html>
